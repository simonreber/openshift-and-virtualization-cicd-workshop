---
# ArgoCD Application — kickstart-server
# Deploys the kickstart HTTP server (Deployment + Service + Route)
# from virt/kickstart-server.yaml in the git repository.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kickstart-server
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: workshop-virt
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workshop-virt

  source:
    repoURL: "https://github.com/YOUR_GITHUB_ORG/YOUR_GITHUB_REPO"
    targetRevision: main
    # Plain directory — ArgoCD applies all YAML files in this path
    path: virt
    directory:
      # Only apply the kickstart server manifest and namespace
      include: "{namespace.yaml,kickstart-server.yaml}"
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: workshop-virt

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 5
