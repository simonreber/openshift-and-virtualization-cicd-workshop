---
# PipelineRun — test build (release candidate)
#
# Trigger manually when you have a release candidate tag ready.
# Usage:
#   RC_TAG=v1.0.0-rc1
#   sed -e "s|__RC_TAG__|${RC_TAG}|g" \
#       tekton/pipelineruns/run-test.yaml | oc create -f -
#
# Variables substituted by setup.sh:
#   simonreber, openshift-and-virtualization-cicd-workshop, rhn_support_sreber
#
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: workshop-test-
  namespace: workshop-ci
  labels:
    app.kubernetes.io/part-of: workshop
    environment: test
spec:
  pipelineRef:
    name: workshop-build-pipeline

  params:
    - name: git-url
      value: "https://github.com/simonreber/openshift-and-virtualization-cicd-workshop"
    - name: git-revision
      # Replace with your rc tag name, e.g. v1.0.0-rc1
      value: "v1.0.0-rc1"
    - name: image-registry
      value: "quay.io"
    - name: image-repo
      value: "rhn_support_sreber/workshop-app"
    - name: image-tag
      # Use the rc tag as image tag for traceability
      value: "v1.0.0-rc1"
    - name: github-repo-url
      value: "https://github.com/simonreber/openshift-and-virtualization-cicd-workshop"
    - name: helm-values-file
      value: "helm/workshop-app/values-test.yaml"
    - name: helm-values-file-branch
      value: "main"

  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: workshop-pipeline-pvc
    - name: quay-credentials
      secret:
        secretName: quay-credentials
    - name: github-token
      secret:
        secretName: github-token
