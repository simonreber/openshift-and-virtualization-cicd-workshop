---
# Webhook shared secret between GitHub and Pipelines as Code.
# Generate a random secret and put it both here and in the GitHub webhook config.
#
# Generate with: openssl rand -hex 20
#
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: workshop-ci
type: Opaque
stringData:
  # Replace with your generated secret
  secret: "REPLACE_WITH_RANDOM_WEBHOOK_SECRET"
