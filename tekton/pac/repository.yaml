---
# Pipelines as Code — Repository resource
# This tells PaC which GitHub repo to watch and what credentials to use.
# The .tekton/ directory in the repo root contains the pipeline run template.
apiVersion: pipelinesascode.tekton.dev/v1alpha1
kind: Repository
metadata:
  name: workshop-app
  namespace: workshop-ci
spec:
  url: "https://github.com/YOUR_GITHUB_ORG/YOUR_GITHUB_REPO"
  # Optional: limit which branches/tags trigger PaC
  # branch_match is a regex
  git_provider:
    secret:
      name: github-token
      key: token
    webhook_secret:
      name: github-webhook-secret
      key: secret
