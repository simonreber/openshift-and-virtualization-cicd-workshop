# Default values for workshop-app Helm chart.
# Override with values-dev.yaml, values-test.yaml, or values-prod.yaml

replicaCount: 1

image:
  repository: quay.io/rhn_support_sreber/workshop-app
  pullPolicy: IfNotPresent
  # tag is overwritten by Tekton pipeline via update-helm-values task
  tag: "latest"

imagePullSecrets:
  - name: quay-credentials

nameOverride: ""
fullnameOverride: "workshop-app"

serviceAccount:
  create: false
  name: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

route:
  enabled: true
  host: ""        # auto-generated by OpenShift if empty
  tls:
    enabled: false
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 10

env: []

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}
