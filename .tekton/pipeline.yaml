---
# Pipelines as Code — PipelineRun template
#
# PaC reads this file from the .tekton/ directory of the repository.
# It automatically creates a PipelineRun when a GitHub event matches
# the annotations below.
#
# Annotations reference: https://pipelinesascode.com/docs/guide/authoringprs/
#
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: workshop-build
  namespace: workshop-ci
  annotations:
    # ── Pipelines as Code event annotations ─────────────────────────────────
    # Trigger on push to main branch AND any tag starting with 'v'
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main, refs/tags/v*]"

    # Maximum number of concurrent PipelineRuns kept (older ones are pruned)
    pipelinesascode.tekton.dev/max-keep-runs: "5"

    # Human-readable task list shown in GitHub PR/commit check
    pipelinesascode.tekton.dev/task: >-
      [git-clone]
spec:
  # Reference to the Pipeline defined in tekton/pipeline.yaml
  pipelineRef:
    name: workshop-build-pipeline

  # ── Determine environment based on ref ──────────────────────────────────
  # PaC exposes these variables automatically:
  #   {{ repo_url }}        → https://github.com/org/repo
  #   {{ revision }}        → commit SHA or tag
  #   {{ source_branch }}   → branch name or tag name
  #   {{ target_branch }}   → target (same as source for push)
  #
  params:
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ revision }}"
    - name: image-registry
      value: quay.io
    # Replace YOUR_QUAY_ORG/YOUR_QUAY_REPO with your actual values
    - name: image-repo
      value: "YOUR_QUAY_ORG/workshop-app"
    # Use the git SHA as image tag for traceability
    - name: image-tag
      value: "{{ revision }}"
    - name: github-repo-url
      value: "{{ repo_url }}"
    # Determine which Helm values file to update based on branch/tag:
    # - main branch   → values-dev.yaml
    # - v*-rc* tag    → values-test.yaml
    # - v*.*.* tag    → values-prod.yaml
    # PaC doesn't support conditional params natively; we use a simple convention:
    # the update-helm-values task always updates values-dev.yaml for branch pushes,
    # and values-test.yaml / values-prod.yaml for tags via separate PipelineRun
    # definitions below.
    - name: helm-values-file
      value: helm/workshop-app/values-dev.yaml
    - name: helm-values-file-branch
      value: main

  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: workshop-pipeline-pvc
    - name: quay-credentials
      secret:
        secretName: quay-credentials
    - name: github-token
      secret:
        secretName: github-token

  taskRunSpecs:
    - pipelineTaskName: build-push-image
      stepSpecs:
        - name: build
          computeResources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"

---
# ── PipelineRun for Release Candidate tags (v*-rc*) → workshop-test ────────
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: workshop-build-rc
  namespace: workshop-ci
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[refs/tags/v*-rc*]"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/task: "[git-clone]"
spec:
  pipelineRef:
    name: workshop-build-pipeline
  params:
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ revision }}"
    - name: image-registry
      value: quay.io
    - name: image-repo
      value: "YOUR_QUAY_ORG/workshop-app"
    - name: image-tag
      value: "{{ source_branch }}"
    - name: github-repo-url
      value: "{{ repo_url }}"
    - name: helm-values-file
      value: helm/workshop-app/values-test.yaml
    - name: helm-values-file-branch
      value: main
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: workshop-pipeline-pvc
    - name: quay-credentials
      secret:
        secretName: quay-credentials
    - name: github-token
      secret:
        secretName: github-token

---
# ── PipelineRun for Release tags (v*.*.*) → workshop-prod ─────────────────
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: workshop-build-release
  namespace: workshop-ci
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push]"
    # Match vX.Y.Z but NOT rc tags
    pipelinesascode.tekton.dev/on-target-branch: "[refs/tags/v*.*.*]"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/task: "[git-clone]"
spec:
  pipelineRef:
    name: workshop-build-pipeline
  params:
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ revision }}"
    - name: image-registry
      value: quay.io
    - name: image-repo
      value: "YOUR_QUAY_ORG/workshop-app"
    - name: image-tag
      value: "{{ source_branch }}"
    - name: github-repo-url
      value: "{{ repo_url }}"
    - name: helm-values-file
      value: helm/workshop-app/values-prod.yaml
    - name: helm-values-file-branch
      value: main
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: workshop-pipeline-pvc
    - name: quay-credentials
      secret:
        secretName: quay-credentials
    - name: github-token
      secret:
        secretName: github-token
